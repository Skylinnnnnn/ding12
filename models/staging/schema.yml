version: 2

models:
  - name: stg_customers
    description: Standardized customers. Grain: one row per customer_id.
    columns:
      - name: customer_id
        description: Order-scoped customer key. Unique in this table.
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        description: Stable identifier for a person across orders (not unique here).

  - name: stg_orders
    description: Standardized orders. Grain: one row per order_id.
    columns:
      - name: order_id
        description: Primary key of an order.
        tests:
          - unique
          - not_null
      - name: customer_id
        description: FK to stg_customers.
        tests:
          - not_null
          - relationships:
              to: ref('stg_customers')
              field: customer_id
      - name: order_status
        description: Lifecycle status of the order.
        tests:
          - accepted_values:
              values:
                - delivered
                - shipped
                - canceled
                - unavailable
                - invoiced
                - processing
                - created
                - approved

  - name: stg_order_items
    description: >
      Standardized order line items (revenue grain). Grain: order_id +
      order_item_id. order_id is intentionally non-unique.
    columns:
      - name: order_id
        description: FK to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: seller_id
        description: FK to stg_sellers.
        tests:
          - relationships:
              to: ref('stg_sellers')
              field: seller_id
      - name: product_id
        description: FK to stg_products.
        tests:
          - relationships:
              to: ref('stg_products')
              field: product_id
      - name: price
        description: Item price in BRL.
        tests:
          - not_null

  - name: stg_order_payments
    description: >
      Standardized payments. Grain: order_id + payment_sequential. order_id is
      non-unique because an order can be split across payment methods.
    columns:
      - name: order_id
        description: FK to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: payment_type
        description: Payment method used.
        tests:
          - accepted_values:
              values:
                - credit_card
                - boleto
                - voucher
                - debit_card
                - not_defined

  - name: stg_order_reviews
    description: >
      Standardized reviews. Grain: one row per review record. Neither review_id
      nor order_id is guaranteed unique.
    columns:
      - name: order_id
        description: FK to stg_orders.
        tests:
          - not_null
          - relationships:
              to: ref('stg_orders')
              field: order_id
      - name: review_score
        description: Customer rating from 1 (worst) to 5 (best).
        tests:
          - accepted_values:
              values: [1, 2, 3, 4, 5]

  - name: stg_products
    description: Standardized products. Grain: one row per product_id.
    columns:
      - name: product_id
        description: Primary key of a product.
        tests:
          - unique
          - not_null

  - name: stg_sellers
    description: Standardized sellers. Grain: one row per seller_id.
    columns:
      - name: seller_id
        description: Primary key of a seller.
        tests:
          - unique
          - not_null

  - name: stg_product_category_translation
    description: Portuguese-to-English category lookup. Grain: one row per category.
    columns:
      - name: product_category_name
        description: Portuguese category name (join key).
        tests:
          - unique
          - not_null
